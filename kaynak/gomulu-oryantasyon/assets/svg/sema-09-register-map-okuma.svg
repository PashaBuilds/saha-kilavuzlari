<svg viewBox="0 0 740 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s09-baslik">
  <title id="s09-baslik">Register map document reading lesson: offset, access type, and reset value annotations on a UART register table.</title>

  <defs>
    <marker id="s09-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- Table frame -->
  <rect x="20" y="40" width="700" height="170" class="svg-kutu"/>

  <!-- Header row -->
  <rect x="20" y="40" width="700" height="34" style="fill: var(--kart-2)"/>
  <text x="90" y="62" text-anchor="middle" class="svg-metin" font-size="12">Name</text>
  <text x="205" y="62" text-anchor="middle" font-size="12" style="fill: var(--vurgu)">Offset</text>
  <text x="295" y="62" text-anchor="middle" class="svg-metin" font-size="12">Access</text>
  <text x="395" y="62" text-anchor="middle" font-size="12" style="fill: var(--altin)">Reset</text>
  <text x="585" y="62" text-anchor="middle" class="svg-metin" font-size="12">Description</text>

  <!-- Column dividers -->
  <path d="M160 40 L 160 210" class="svg-cizgi"/>
  <path d="M250 40 L 250 210" class="svg-cizgi"/>
  <path d="M340 40 L 340 210" class="svg-cizgi"/>
  <path d="M450 40 L 450 210" class="svg-cizgi"/>

  <!-- Row dividers -->
  <path d="M20 74 L 720 74" class="svg-cizgi"/>
  <path d="M20 108 L 720 108" class="svg-cizgi"/>
  <path d="M20 142 L 720 142" class="svg-cizgi"/>
  <path d="M20 176 L 720 176" class="svg-cizgi"/>

  <!-- Row 1: CR -->
  <text x="90" y="96" text-anchor="middle" class="svg-kod" font-size="12">CR</text>
  <text x="205" y="96" text-anchor="middle" class="svg-kod" font-size="12">0x00</text>
  <text x="295" y="96" text-anchor="middle" class="svg-kod" font-size="12">R/W</text>
  <text x="395" y="96" text-anchor="middle" class="svg-kod" font-size="11">0x00000128</text>
  <text x="460" y="96" class="svg-soluk" font-size="11">TX/RX enable, reset bits</text>

  <!-- Row 2: MR -->
  <text x="90" y="130" text-anchor="middle" class="svg-kod" font-size="12">MR</text>
  <text x="205" y="130" text-anchor="middle" class="svg-kod" font-size="12">0x04</text>
  <text x="295" y="130" text-anchor="middle" class="svg-kod" font-size="12">R/W</text>
  <text x="395" y="130" text-anchor="middle" class="svg-kod" font-size="11">0x00000000</text>
  <text x="460" y="130" class="svg-soluk" font-size="11">baud source, data/stop bits</text>

  <!-- Row 3: SR -->
  <text x="90" y="164" text-anchor="middle" class="svg-kod" font-size="12">SR</text>
  <text x="205" y="164" text-anchor="middle" class="svg-kod" font-size="12">0x2C</text>
  <text x="295" y="164" text-anchor="middle" class="svg-kod" font-size="12">RO</text>
  <text x="395" y="164" text-anchor="middle" class="svg-kod" font-size="11">—</text>
  <text x="460" y="164" class="svg-soluk" font-size="11">TX/RX FIFO status (TXFULL...)</text>

  <!-- Row 4: ISR (W1C highlighted) -->
  <rect x="250" y="176" width="90" height="34" style="fill: var(--kirmizi-soluk)"/>
  <text x="90" y="198" text-anchor="middle" class="svg-kod" font-size="12">ISR</text>
  <text x="205" y="198" text-anchor="middle" class="svg-kod" font-size="12">0x14</text>
  <text x="295" y="198" text-anchor="middle" font-size="12" style="fill: var(--kirmizi)">W1C</text>
  <text x="395" y="198" text-anchor="middle" class="svg-kod" font-size="11">0x00000000</text>
  <text x="460" y="198" class="svg-soluk" font-size="11">interrupt flags</text>

  <!-- Annotation 1: offset -->
  <path d="M120 250 L 205 212" class="svg-cizgi" fill="none" marker-end="url(#s09-ok)"/>
  <rect x="20" y="250" width="200" height="50" rx="8" class="svg-kutu" style="stroke: var(--vurgu)"/>
  <text x="120" y="271" text-anchor="middle" font-size="12" style="fill: var(--vurgu)">offset → added to</text>
  <text x="120" y="287" text-anchor="middle" font-size="12" style="fill: var(--vurgu)">base address</text>

  <!-- Annotation 2: access / W1C -->
  <path d="M385 250 L 295 212" class="svg-cizgi" fill="none" marker-end="url(#s09-ok)"/>
  <rect x="270" y="250" width="230" height="50" rx="8" class="svg-kutu" style="stroke: var(--kirmizi)"/>
  <text x="385" y="271" text-anchor="middle" font-size="12" style="fill: var(--kirmizi)">access: W1C = cleared</text>
  <text x="385" y="287" text-anchor="middle" font-size="12" style="fill: var(--kirmizi)">by writing 1</text>

  <!-- Annotation 3: reset -->
  <path d="M625 250 L 395 212" class="svg-cizgi" fill="none" marker-end="url(#s09-ok)"/>
  <rect x="530" y="250" width="190" height="50" rx="8" class="svg-kutu" style="stroke: var(--altin)"/>
  <text x="625" y="271" text-anchor="middle" font-size="12" style="fill: var(--altin)">reset value: value</text>
  <text x="625" y="287" text-anchor="middle" font-size="12" style="fill: var(--altin)">after power-up</text>
</svg>
