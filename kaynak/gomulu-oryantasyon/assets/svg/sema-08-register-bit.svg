<svg viewBox="0 0 740 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s08-baslik">
  <title id="s08-baslik">Şekil 8 — 32-bit register bit alanı anatomisi: UART SR register'ından TXFULL, TXEMPTY, RXFULL, RXEMPTY bitleri vurgulu, kalan bitler reserved; altta R/W, RO ve W1C erişim tipi rozetleri.</title>

