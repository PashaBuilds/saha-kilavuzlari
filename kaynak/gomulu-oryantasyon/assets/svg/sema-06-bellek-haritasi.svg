<svg viewBox="0 0 740 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s06-baslik">
  <title id="s06-baslik">Bellek haritası dikey adres çubuğu: OCM, çevre birimi register blokları, PL adres pencereleri ve DDR Low; sağda ayrı bir çubukta DDR High.</title>

  <!-- adres artış yönü -->
  <path d="M70 558 L 70 45" class="svg-cizgi" fill="none" marker-end="url(#s06-ok)"/>
  <defs>
    <marker id="s06-ok" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 8 L5 0 L10 8 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>
  <text x="55" y="300" text-anchor="middle" class="svg-soluk" font-size="11">adres</text>
  <text x="55" y="314" text-anchor="middle" class="svg-soluk" font-size="11">artıyor</text>

  <!-- ana çubuk dış çerçeve -->
  <rect x="100" y="40" width="240" height="520" class="svg-kutu"/>

  <!-- DDR Low (0x0 - 0x7FFF_FFFF), 2 GB -->
  <rect x="100" y="400" width="240" height="160" style="fill: var(--yesil-soluk)"/>
  <text x="220" y="465" text-anchor="middle" class="svg-metin" font-size="13">DDR Low — 2 GB</text>
  <text x="220" y="483" text-anchor="middle" class="svg-kod" font-size="11">0x0000_0000 – 0x7FFF_FFFF</text>
  <text x="106" y="555" class="svg-kod" font-size="11">0x0</text>

  <!-- PL adres pencereleri -->
  <rect x="100" y="260" width="240" height="140" style="fill: var(--mor-soluk)"/>
  <text x="220" y="325" text-anchor="middle" class="svg-metin" font-size="13">PL adres pencereleri</text>
  <text x="220" y="343" text-anchor="middle" class="svg-soluk" font-size="11">(bitstream'e göre değişir)</text>

  <!-- Çevre birimi bölgesi -->
  <rect x="100" y="90" width="240" height="170" style="fill: var(--vurgu-soluk)"/>
  <text x="220" y="104" text-anchor="middle" class="svg-metin" font-size="12">çevre birimleri — 0xFF00_0000</text>

  <rect x="110" y="110" width="220" height="30" rx="4" class="svg-kutu"/>
  <text x="220" y="129" text-anchor="middle" class="svg-kod" font-size="11">UART0 — 0xFF00_0000</text>

  <rect x="110" y="144" width="220" height="30" rx="4" class="svg-kutu"/>
  <text x="220" y="163" text-anchor="middle" class="svg-kod" font-size="11">UART1 — 0xFF01_0000</text>

  <rect x="110" y="178" width="220" height="30" rx="4" class="svg-kutu"/>
  <text x="220" y="197" text-anchor="middle" class="svg-kod" font-size="11">GPIO — 0xFF0A_0000</text>

  <rect x="110" y="212" width="220" height="30" rx="4" class="svg-kutu"/>
  <text x="220" y="231" text-anchor="middle" class="svg-kod" font-size="11">TTC0 — 0xFF11_0000</text>

  <!-- OCM -->
  <rect x="100" y="40" width="240" height="50" style="fill: var(--altin-soluk)"/>
  <text x="220" y="60" text-anchor="middle" class="svg-metin" font-size="12">OCM — 256 KB</text>
  <text x="220" y="76" text-anchor="middle" class="svg-kod" font-size="11">0xFFFC_0000</text>

  <!-- bölüm ayraçları -->
  <path d="M100 90 L 340 90" class="svg-cizgi"/>
  <path d="M100 260 L 340 260" class="svg-cizgi"/>
  <path d="M100 400 L 340 400" class="svg-cizgi"/>

  <!-- kopukluk göstergesi: DDR Low ile DDR High arasında adres sürekliliği yok -->
  <text x="410" y="465" text-anchor="middle" class="svg-soluk" font-size="11">adres sürekliliği yok</text>
  <path d="M340 480 L 480 480" class="svg-cizgi" fill="none" style="stroke-dasharray:4 4"/>
  <path d="M400 472 L 408 488" class="svg-cizgi" fill="none"/>
  <path d="M412 472 L 420 488" class="svg-cizgi" fill="none"/>

  <!-- DDR High: ayrı mini çubuk -->
  <text x="550" y="450" text-anchor="middle" class="svg-metin" font-size="13">DDR High</text>
  <rect x="480" y="460" width="140" height="100" style="fill: var(--yesil-soluk)" class="svg-cizgi"/>
  <text x="550" y="500" text-anchor="middle" class="svg-soluk" font-size="11">32 GB pencere</text>
  <text x="550" y="518" text-anchor="middle" class="svg-kod" font-size="11">0x8_0000_0000 –</text>
  <text x="550" y="533" text-anchor="middle" class="svg-kod" font-size="11">0xF_FFFF_FFFF</text>
  <text x="550" y="583" text-anchor="middle" class="svg-soluk" font-size="11">(aynı SODIMM'in üst 2 GB'ı)</text>
</svg>
