<svg viewBox="0 0 740 390" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s07-baslik">
  <title id="s07-baslik">Şekil 7 — Adres = kapı numarası: CPU'dan adres veriyolu üzerinden çevre birimi register'ına giden yazma işleminin yolu; 0xFF0A0000'daki GPIO birimi vurgulu.</title>

  <defs>
    <marker id="s07-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--vurgu)"/>
    </marker>
  </defs>

  <!-- CPU -->
  <rect x="30" y="170" width="110" height="70" rx="8" class="svg-kutu" style="stroke: var(--vurgu)"/>
  <text x="85" y="210" text-anchor="middle" class="svg-metin" font-size="14">CPU</text>
  <text x="85" y="258" text-anchor="middle" class="svg-soluk" font-size="11">adres + veri üretir</text>

  <!-- Street: address bus (bus) -->
  <text x="330" y="152" text-anchor="middle" class="svg-soluk" font-size="12">adres veriyolu</text>
  <rect x="150" y="170" width="360" height="70" class="svg-kutu"/>
  <path d="M150 205 L 510 205" class="svg-cizgi" fill="none" style="stroke-dasharray:5 4"/>

  <!-- Highlighted operation: CPU -> bus -> GPIO unit -->
  <path d="M140 205 L 150 205 L 505 210 L 528 210" fill="none" stroke="var(--vurgu)" stroke-width="2.5" marker-end="url(#s07-ok)"/>
  <text x="330" y="270" text-anchor="middle" class="svg-metin" font-size="12">CPU → GPIO birimi: <tspan style="fill: var(--vurgu)">DATA_0 (0xFF0A0040)</tspan> adresine yazma</text>

  <!-- faded connections to the other unused doors -->
  <path d="M510 188 L 528 100" class="svg-cizgi" fill="none"/>
  <path d="M510 222 L 528 320" class="svg-cizgi" fill="none"/>

  <!-- Buildings: peripherals with door numbers -->
  <rect x="530" y="60" width="160" height="80" rx="8" class="svg-kutu"/>
  <text x="610" y="95" text-anchor="middle" class="svg-metin" font-size="12">UART0 birimi</text>
  <rect x="550" y="112" width="120" height="22" rx="4" class="svg-kutu"/>
  <text x="610" y="127" text-anchor="middle" class="svg-kod" font-size="11">0xFF00_0000</text>

  <rect x="530" y="170" width="160" height="80" rx="8" class="svg-kutu" style="stroke: var(--vurgu)"/>
  <text x="610" y="205" text-anchor="middle" class="svg-metin" font-size="12">GPIO birimi</text>
  <rect x="550" y="222" width="120" height="22" rx="4" class="svg-kutu" style="fill: var(--vurgu-soluk); stroke: var(--vurgu)"/>
  <text x="610" y="237" text-anchor="middle" class="svg-kod" font-size="11">0xFF0A_0000</text>

  <rect x="530" y="280" width="160" height="80" rx="8" class="svg-kutu"/>
  <text x="610" y="315" text-anchor="middle" class="svg-metin" font-size="12">TTC0 birimi</text>
  <rect x="550" y="332" width="120" height="22" rx="4" class="svg-kutu"/>
  <text x="610" y="347" text-anchor="middle" class="svg-kod" font-size="11">0xFF11_0000</text>
</svg>
