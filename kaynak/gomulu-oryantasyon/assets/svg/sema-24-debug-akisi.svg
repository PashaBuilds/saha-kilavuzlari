<svg viewBox="0 0 740 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s24-baslik">
  <title id="s24-baslik">Şekil 24 — Debug oturumu döngüsü: JTAG'e bağlan → breakpoint koy → run/halt → adım adım ilerle → register/bellek/değişken izle → hipotez kur → düzelt ve yeniden derle, döngü baştan başlar; kenarda "dört araç" rozetleri (printf, LED, debugger, logic analyzer).</title>

  <!-- loop arrows -->
  <path d="M 417.6 87.5 L 452.3 107.5" stroke="var(--vurgu)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok)"/>
  <path d="M 499.9 190 L 499.9 230" stroke="var(--vurgu)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok)"/>
  <path d="M 452.3 312.5 L 417.6 332.5" stroke="var(--vurgu)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok)"/>
  <path d="M 322.4 332.5 L 287.7 312.5" stroke="var(--vurgu)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok)"/>
  <path d="M 240.1 230 L 240.1 190" stroke="var(--vurgu)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok)"/>
  <path d="M 287.7 107.5 L 322.4 87.5" stroke="var(--altin)" stroke-width="2.4" fill="none" marker-end="url(#s24-ok-altin)"/>
  <text x="240" y="95" text-anchor="middle" class="svg-soluk" font-size="10">yeniden derle</text>

  <!-- node 0: JTAG connect -->
  <g>
    <rect x="290" y="32" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="300" cy="42" r="11" fill="var(--vurgu)"/>
    <text x="300" y="46" text-anchor="middle" font-size="11" fill="var(--zemin)">1</text>
    <text x="370" y="65" text-anchor="middle" class="svg-metin" font-size="12">JTAG'e Bağlan</text>
    <text x="370" y="79" text-anchor="middle" class="svg-soluk" font-size="9">hw_server üzerinden</text>
  </g>

  <!-- node 1: set breakpoint -->
  <g>
    <rect x="419.9" y="107" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="429.9" cy="117" r="11" fill="var(--vurgu)"/>
    <text x="429.9" y="121" text-anchor="middle" font-size="11" fill="var(--zemin)">2</text>
    <text x="499.9" y="140" text-anchor="middle" class="svg-metin" font-size="12">Breakpoint Koy</text>
    <text x="499.9" y="154" text-anchor="middle" class="svg-soluk" font-size="9">şüpheli satırı işaretle</text>
  </g>

  <!-- node 2: Run / Stopped -->
  <g>
    <rect x="419.9" y="257" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="429.9" cy="267" r="11" fill="var(--vurgu)"/>
    <text x="429.9" y="271" text-anchor="middle" font-size="11" fill="var(--zemin)">3</text>
    <text x="499.9" y="290" text-anchor="middle" class="svg-metin" font-size="12">Run / Durdur</text>
    <text x="499.9" y="304" text-anchor="middle" class="svg-soluk" font-size="9">breakpoint'te durur</text>
  </g>

  <!-- node 3: Step -->
  <g>
    <rect x="290" y="332" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="300" cy="342" r="11" fill="var(--vurgu)"/>
    <text x="300" y="346" text-anchor="middle" font-size="11" fill="var(--zemin)">4</text>
    <text x="370" y="365" text-anchor="middle" class="svg-metin" font-size="12">Adım Adım İlerle</text>
    <text x="370" y="379" text-anchor="middle" class="svg-soluk" font-size="9">step over / step into</text>
  </g>

  <!-- node 4: watch Register/Memory -->
  <g>
    <rect x="160.1" y="257" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="170.1" cy="267" r="11" fill="var(--vurgu)"/>
    <text x="170.1" y="271" text-anchor="middle" font-size="11" fill="var(--zemin)">5</text>
    <text x="240.1" y="285" text-anchor="middle" class="svg-metin" font-size="12">Register / Bellek</text>
    <text x="240.1" y="299" text-anchor="middle" class="svg-metin" font-size="12">Değişken İzleme</text>
  </g>

  <!-- node 5: Hypothesis -> Fix -->
  <g>
    <rect x="160.1" y="107" width="160" height="56" rx="10" class="svg-kutu" style="stroke: var(--vurgu)"/>
    <circle cx="170.1" cy="117" r="11" fill="var(--vurgu)"/>
    <text x="170.1" y="121" text-anchor="middle" font-size="11" fill="var(--zemin)">6</text>
    <text x="240.1" y="140" text-anchor="middle" class="svg-metin" font-size="12">Hipotez Kur</text>
    <text x="240.1" y="154" text-anchor="middle" class="svg-soluk" font-size="9">→ düzelt, derle, yeniden dene</text>
  </g>

  <!-- four-tool badges -->
  <text x="370" y="420" text-anchor="middle" class="svg-soluk" font-size="11">Dört araç — belirtiye göre seç</text>

  <rect x="40" y="434" width="130" height="30" rx="15" class="svg-kutu" style="stroke: var(--sinyal-1)"/>
  <circle cx="58" cy="449" r="4" fill="var(--sinyal-1)"/>
  <text x="105" y="453" text-anchor="middle" class="svg-metin" font-size="11">printf</text>

  <rect x="200" y="434" width="130" height="30" rx="15" class="svg-kutu" style="stroke: var(--sinyal-2)"/>
  <circle cx="218" cy="449" r="4" fill="var(--sinyal-2)"/>
  <text x="265" y="453" text-anchor="middle" class="svg-metin" font-size="11">LED</text>

  <rect x="360" y="434" width="150" height="30" rx="15" class="svg-kutu" style="stroke: var(--sinyal-3)"/>
  <circle cx="378" cy="449" r="4" fill="var(--sinyal-3)"/>
  <text x="435" y="453" text-anchor="middle" class="svg-metin" font-size="11">Debugger</text>

  <rect x="540" y="434" width="160" height="30" rx="15" class="svg-kutu" style="stroke: var(--sinyal-5)"/>
  <circle cx="558" cy="449" r="4" fill="var(--sinyal-5)"/>
  <text x="620" y="453" text-anchor="middle" class="svg-metin" font-size="11">Logic Analyzer</text>

  <defs>
    <marker id="s24-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--vurgu)"/>
    </marker>
    <marker id="s24-ok-altin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--altin)"/>
    </marker>
  </defs>
</svg>
