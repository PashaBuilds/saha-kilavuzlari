<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="s15-baslik">
  <title id="s15-baslik">Interrupt life cycle: six steps from a peripheral event to the main loop processing the flag; the need to keep the ISR short is highlighted, along with an incorrect example</title>

  <defs>
    <marker id="s15-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--vurgu)"/>
    </marker>
    <marker id="s15-ok-kirmizi" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--kirmizi)"/>
    </marker>
  </defs>

  <!-- box 1: peripheral -->
  <rect x="10" y="60" width="110" height="90" rx="8" class="svg-kutu"/>
  <text x="65" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">Peripheral</text>
  <text x="65" y="106" text-anchor="middle" class="svg-soluk" font-size="10">button / timer /</text>
  <text x="65" y="118" text-anchor="middle" class="svg-soluk" font-size="10">UART, etc.</text>
  <text x="65" y="136" text-anchor="middle" class="svg-metin" font-size="10">generates event</text>

  <path d="M120 105 L134 105" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- box 2: GIC -->
  <rect x="136" y="60" width="110" height="90" rx="8" class="svg-kutu"/>
  <text x="191" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">GIC</text>
  <text x="191" y="106" text-anchor="middle" class="svg-soluk" font-size="10">(GIC-400)</text>
  <text x="191" y="122" text-anchor="middle" class="svg-soluk" font-size="10">priority +</text>
  <text x="191" y="136" text-anchor="middle" class="svg-soluk" font-size="10">routing</text>

  <path d="M246 105 L260 105" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- box 3: CPU vector -->
  <rect x="262" y="60" width="110" height="90" rx="8" class="svg-kutu"/>
  <text x="317" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">CPU</text>
  <text x="317" y="106" text-anchor="middle" class="svg-soluk" font-size="10">interrupt vector</text>
  <text x="317" y="122" text-anchor="middle" class="svg-soluk" font-size="10">(IRQ entry,</text>
  <text x="317" y="136" text-anchor="middle" class="svg-soluk" font-size="10">context save)</text>

  <path d="M372 105 L386 105" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- box 4: ISR — highlighted -->
  <text x="443" y="48" text-anchor="middle" fill="var(--altin)" font-size="11" font-weight="700">KEEP SHORT!</text>
  <rect x="388" y="60" width="110" height="90" rx="8" class="svg-kutu" style="stroke:var(--altin); stroke-width:2"/>
  <text x="443" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">ISR</text>
  <text x="443" y="106" text-anchor="middle" class="svg-soluk" font-size="10">set flag</text>
  <text x="443" y="120" text-anchor="middle" class="svg-soluk" font-size="10">+ ack interrupt</text>
  <text x="443" y="136" text-anchor="middle" fill="var(--yesil)" font-size="10">that's it, exit</text>

  <path d="M498 105 L512 105" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- box 5: Return -->
  <rect x="514" y="60" width="110" height="90" rx="8" class="svg-kutu"/>
  <text x="569" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">Return</text>
  <text x="569" y="106" text-anchor="middle" class="svg-soluk" font-size="10">(interrupt</text>
  <text x="569" y="120" text-anchor="middle" class="svg-soluk" font-size="10">return)</text>
  <text x="569" y="136" text-anchor="middle" class="svg-soluk" font-size="10">context restored</text>

  <path d="M624 105 L638 105" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- box 6: Main loop -->
  <rect x="640" y="60" width="110" height="90" rx="8" class="svg-kutu" style="stroke:var(--yesil); stroke-width:2"/>
  <text x="695" y="90" text-anchor="middle" class="svg-metin" font-size="12" font-weight="700">Main loop</text>
  <text x="695" y="106" text-anchor="middle" class="svg-soluk" font-size="10">sees the flag,</text>
  <text x="695" y="120" text-anchor="middle" class="svg-soluk" font-size="10">does the real work</text>
  <text x="695" y="134" text-anchor="middle" class="svg-soluk" font-size="10">here</text>

  <!-- vertical arrow from ISR to the wrong example -->
  <path d="M443 150 L443 200" stroke="var(--kirmizi)" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#s15-ok-kirmizi)"/>
  <text x="443" y="196" text-anchor="middle" fill="var(--kirmizi)" font-size="10">avoid this</text>

  <!-- wrong example box -->
  <rect x="303" y="204" width="280" height="86" rx="8" class="svg-kutu" style="stroke:var(--kirmizi); stroke-width:2; fill:var(--kirmizi-soluk)"/>
  <text x="443" y="226" text-anchor="middle" fill="var(--kirmizi)" font-size="11" font-weight="700">INCORRECT EXAMPLE</text>
  <text x="443" y="244" text-anchor="middle" class="svg-kod" font-size="10">Inside ISR: xil_printf(...)</text>
  <text x="443" y="258" text-anchor="middle" class="svg-kod" font-size="10">+ delay loop</text>
  <text x="443" y="276" text-anchor="middle" fill="var(--kirmizi)" font-size="10">→ other interrupts are delayed, missed</text>
  <!-- cross mark -->
  <g stroke="var(--kirmizi)" stroke-width="3" stroke-linecap="round">
    <line x1="565" y1="212" x2="581" y2="228"/>
    <line x1="581" y1="212" x2="565" y2="228"/>
  </g>

  <text x="65" y="310" class="svg-soluk" font-size="11">The main loop clears the flag after processing it; the system becomes ready for the next event.</text>
</svg>
