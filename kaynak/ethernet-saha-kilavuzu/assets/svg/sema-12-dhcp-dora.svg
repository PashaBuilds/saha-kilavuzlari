<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-s12">
<title id="t-s12">DHCP'nin dört adımlı DORA akışı: Discover, Offer, Request ve Acknowledge mesajlarıyla adres kiralama</title>
<defs>
<marker id="ok12g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--gold)"/>
</marker>
<marker id="ok12a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
</marker>
</defs>

<!-- aktörler -->
<g text-anchor="middle">
<rect x="80" y="36" width="220" height="58" rx="8" fill="var(--dia-blok)" stroke="var(--line-2)"/>
<text x="190" y="59" class="s-metin">Yeni cihaz (istemci)</text>
<text x="190" y="80" class="s-mono2">IP'si henüz YOK: 0.0.0.0</text>

<rect x="560" y="36" width="220" height="58" rx="8" fill="var(--dia-blok)" stroke="var(--gold)"/>
<text x="670" y="59" class="s-metin">DHCP sunucusu</text>
<text x="670" y="80" class="s-mono2">çoğu ağda router'ın içinde</text>
</g>

<g stroke="var(--line-2)" stroke-dasharray="3 5">
<line x1="190" y1="94" x2="190" y2="380"/>
<line x1="670" y1="94" x2="670" y2="380"/>
</g>

<!-- D -->
<line x1="190" y1="140" x2="664" y2="140" stroke="var(--gold)" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#ok12g)"/>
<text x="430" y="126" class="s-metin s-altin" text-anchor="middle">1 · DISCOVER — broadcast</text>
<text x="430" y="160" class="s-mono2" text-anchor="middle">“Ağda DHCP sunucusu var mı? Bana IP lazım.”</text>

<!-- O -->
<line x1="670" y1="204" x2="196" y2="204" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#ok12a)"/>
<text x="430" y="190" class="s-metin s-vurgu" text-anchor="middle">2 · OFFER</text>
<text x="430" y="224" class="s-mono2" text-anchor="middle">“192.168.1.57'yi öneriyorum; mask /24, gateway .1, DNS .1”</text>

<!-- R -->
<line x1="190" y1="268" x2="664" y2="268" stroke="var(--gold)" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#ok12g)"/>
<text x="430" y="254" class="s-metin s-altin" text-anchor="middle">3 · REQUEST — broadcast</text>
<text x="430" y="288" class="s-mono2" text-anchor="middle">“192.168.1.57'yi istiyorum.” (birden çok teklif varsa seçim ilanı)</text>

<!-- A -->
<line x1="670" y1="332" x2="196" y2="332" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#ok12a)"/>
<text x="430" y="318" class="s-metin s-vurgu" text-anchor="middle">4 · ACK</text>
<text x="430" y="352" class="s-mono2" text-anchor="middle">“Senindir. Lease (kira) süresi: 24 saat.”</text>

<!-- sonuç -->
<rect x="80" y="392" width="700" height="36" rx="8" fill="var(--green-soft)" stroke="var(--green)"/>
<text x="430" y="415" class="s-metin s-yesil" text-anchor="middle">Cihaz artık 192.168.1.57; kira yarıya inince ACK'ı veren sunucudan sessizce yenileme ister.</text>
</svg>
