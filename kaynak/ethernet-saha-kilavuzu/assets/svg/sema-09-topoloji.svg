<svg viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-s09">
<title id="t-s09">Tipik ev veya lab ağı topolojisi: cihazlar switch'e, switch router'a yani default gateway'e, router internete bağlanır</title>
<defs>
<marker id="ok09" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--ink-2)"/>
</marker>
</defs>

<!-- LAN çerçevesi -->
<rect x="30" y="60" width="560" height="270" rx="12" fill="var(--dia-panel)" stroke="var(--line-2)" stroke-dasharray="6 5"/>
<text x="50" y="88" class="s-metin2">Yerel ağ — 192.168.1.0/24 (tek broadcast domain)</text>

<!-- cihazlar -->
<rect x="60" y="120" width="130" height="62" rx="8" fill="var(--dia-blok)" stroke="var(--line-2)"/>
<text x="125" y="146" class="s-metin" text-anchor="middle">PC</text>
<text x="125" y="166" class="s-mono2" text-anchor="middle">192.168.1.20</text>

<rect x="60" y="230" width="130" height="62" rx="8" fill="var(--dia-blok)" stroke="var(--accent)"/>
<text x="125" y="256" class="s-metin" text-anchor="middle">FPGA kartı</text>
<text x="125" y="276" class="s-mono2" text-anchor="middle">192.168.1.130</text>

<!-- switch -->
<rect x="280" y="175" width="110" height="62" rx="8" fill="var(--dia-blok-2)" stroke="var(--green)" stroke-width="1.4"/>
<text x="335" y="201" class="s-metin" text-anchor="middle">switch</text>
<text x="335" y="221" class="s-mono2" text-anchor="middle">(L2 — IP'si yok*)</text>

<line x1="190" y1="151" x2="280" y2="192" stroke="var(--line-2)" stroke-width="1.6"/>
<line x1="190" y1="261" x2="280" y2="220" stroke="var(--line-2)" stroke-width="1.6"/>

<!-- router / gateway -->
<rect x="450" y="160" width="120" height="92" rx="8" fill="var(--dia-blok-2)" stroke="var(--gold)" stroke-width="1.6"/>
<text x="510" y="188" class="s-metin" text-anchor="middle">router</text>
<text x="510" y="208" class="s-metin2" text-anchor="middle">= default gateway</text>
<text x="510" y="230" class="s-mono2" text-anchor="middle">LAN: 192.168.1.1</text>

<line x1="390" y1="206" x2="450" y2="206" stroke="var(--line-2)" stroke-width="1.6"/>

<!-- WAN + internet -->
<line x1="570" y1="206" x2="660" y2="206" stroke="var(--gold)" stroke-width="1.6" marker-end="url(#ok09)"/>
<text x="612" y="196" class="s-mono2" text-anchor="middle">WAN</text>
<text x="612" y="228" class="s-mono2" text-anchor="middle">85.102.7.44</text>

<path d="M700 170 q-24 4 -22 26 q-18 4 -14 22 q0 20 24 20 l 110 0 q26 0 26 -22 q16 -6 8 -24 q4 -22 -22 -24 q-6 -18 -34 -14 q-24 -12 -46 2 q-22 -4 -30 14 z" fill="var(--dia-blok)" stroke="var(--line-2)" stroke-width="1.4"/>
<text x="768" y="216" class="s-metin" text-anchor="middle">internet</text>

<!-- alt notlar -->
<text x="50" y="356" class="s-metin2">* Yönetilebilir switch'in yönetim arayüzü için IP'si olabilir; frame iletmek için gerekmez.</text>
<text x="612" y="286" class="s-metin2" text-anchor="middle">Uzak hedefe giden her paket</text>
<text x="612" y="304" class="s-metin2" text-anchor="middle">önce gateway'e uğrar;</text>
<text x="612" y="322" class="s-metin2" text-anchor="middle">LAN'ın tek çıkış kapısı burası.</text>
</svg>
