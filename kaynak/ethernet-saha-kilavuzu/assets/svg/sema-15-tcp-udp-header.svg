<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-s15">
<title id="t-s15">TCP ve UDP header alan haritalarının yan yana karşılaştırması: TCP 20 byte ve zengin, UDP 8 byte ve minimal</title>

<text x="40" y="40" class="s-baslik">TCP header — 20 byte (seçeneksiz)</text>
<text x="600" y="40" class="s-baslik">UDP — 8 byte</text>

<!-- 32-bit genişlik cetveli -->
<text x="40" y="66" class="s-mono2">← 32 bit (4 byte) →</text>

<!-- TCP: 5 satır x 4 byte; satır 96px genişlik/2 byte -->
<g stroke-width="1.3">
<rect x="40"  y="76" width="200" height="46" rx="4" fill="var(--accent-soft)" stroke="var(--accent)"/>
<rect x="240" y="76" width="200" height="46" rx="4" fill="var(--accent-soft)" stroke="var(--accent)"/>
<rect x="40"  y="122" width="400" height="46" rx="4" fill="var(--green-soft)" stroke="var(--green)"/>
<rect x="40"  y="168" width="400" height="46" rx="4" fill="var(--green-soft)" stroke="var(--green)"/>
<rect x="40"  y="214" width="200" height="46" rx="4" fill="var(--gold-soft)" stroke="var(--gold)"/>
<rect x="240" y="214" width="200" height="46" rx="4" fill="var(--gold-soft)" stroke="var(--gold)"/>
<rect x="40"  y="260" width="200" height="46" rx="4" fill="var(--dia-blok-2)" stroke="var(--line-2)"/>
<rect x="240" y="260" width="200" height="46" rx="4" fill="var(--dia-blok-2)" stroke="var(--line-2)"/>
</g>
<g text-anchor="middle">
<text x="140" y="96" class="s-mono2">Source Port</text><text x="140" y="112" class="s-mono2">(kaynak port)</text>
<text x="340" y="96" class="s-mono2">Destination Port</text><text x="340" y="112" class="s-mono2">(hedef port)</text>
<text x="240" y="141" class="s-mono2">Sequence Number — sıra no</text>
<text x="240" y="157" class="s-mono2">“bu verinin kaçıncı byte'ı?”</text>
<text x="240" y="187" class="s-mono2">Acknowledgment Number — onay no</text>
<text x="240" y="203" class="s-mono2">“buraya kadar aldım”</text>
<text x="140" y="234" class="s-mono2">Offset + Bayraklar</text>
<text x="140" y="250" class="s-mono2">SYN ACK FIN RST PSH</text>
<text x="340" y="234" class="s-mono2">Window Size</text>
<text x="340" y="250" class="s-mono2">“şu kadar daha alabilirim”</text>
<text x="140" y="280" class="s-mono2">Checksum</text><text x="140" y="296" class="s-mono2">(sağlama)</text>
<text x="340" y="280" class="s-mono2">Urgent Pointer</text><text x="340" y="296" class="s-mono2">(nadiren kullanılır)</text>
</g>

<!-- UDP: 2 satır -->
<g stroke-width="1.3">
<rect x="600" y="76" width="110" height="46" rx="4" fill="var(--accent-soft)" stroke="var(--accent)"/>
<rect x="710" y="76" width="110" height="46" rx="4" fill="var(--accent-soft)" stroke="var(--accent)"/>
<rect x="600" y="122" width="110" height="46" rx="4" fill="var(--dia-blok-2)" stroke="var(--line-2)"/>
<rect x="710" y="122" width="110" height="46" rx="4" fill="var(--dia-blok-2)" stroke="var(--line-2)"/>
</g>
<g text-anchor="middle">
<text x="655" y="96" class="s-mono2">Source</text><text x="655" y="112" class="s-mono2">Port</text>
<text x="765" y="96" class="s-mono2">Dest</text><text x="765" y="112" class="s-mono2">Port</text>
<text x="655" y="141" class="s-mono2">Length</text><text x="655" y="157" class="s-mono2">(uzunluk)</text>
<text x="765" y="141" class="s-mono2">Checksum</text><text x="765" y="157" class="s-mono2">(sağlama)</text>
</g>
<text x="600" y="196" class="s-metin2">Hepsi bu.</text>
<text x="600" y="222" class="s-metin2">Sıra no yok → sıralama yok</text>
<text x="600" y="242" class="s-metin2">ACK yok → teslim garantisi yok</text>
<text x="600" y="262" class="s-metin2">Window yok → akış kontrolü yok</text>
<text x="600" y="290" class="s-metin2 s-yesil">Karşılığı: düşük gecikme,</text>
<text x="600" y="310" class="s-metin2 s-yesil">öngörülebilir zamanlama,</text>
<text x="600" y="330" class="s-metin2 s-yesil">frame başına 12 byte tasarruf</text>

<!-- alt not -->
<path d="M40 330 L440 330" stroke="var(--line-2)"/>
<text x="40" y="356" class="s-metin2">Renk anahtarı: <tspan class="s-vurgu">portlar</tspan> · <tspan class="s-yesil">güvenilirlik makinesi (seq/ack)</tspan> · <tspan class="s-altin">kontrol ve akış</tspan></text>
<text x="40" y="382" class="s-metin2">TCP'nin fazladan taşıdığı her alan, Bölüm içindeki bir mekanizmanın karşılığıdır — süs yoktur.</text>
</svg>
