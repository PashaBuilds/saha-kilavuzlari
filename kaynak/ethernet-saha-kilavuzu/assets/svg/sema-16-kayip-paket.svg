<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-s16">
<title id="t-s16">Kayıp paket karşısında TCP'nin yeniden gönderimi ile UDP'nin umursamazlığının iki panel halinde karşılaştırması</title>
<defs>
<marker id="ok16g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--green)"/>
</marker>
<marker id="ok16r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--red)"/>
</marker>
<marker id="ok16a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
</marker>
</defs>

<!-- ============== TCP paneli ============== -->
<rect x="30" y="30" width="390" height="380" rx="12" fill="var(--dia-panel)" stroke="var(--line-2)"/>
<text x="225" y="60" class="s-baslik" text-anchor="middle">TCP: kayıp telafi edilir</text>

<g stroke="var(--line-2)" stroke-dasharray="3 5">
<line x1="90" y1="80" x2="90" y2="380"/>
<line x1="360" y1="80" x2="360" y2="380"/>
</g>
<text x="90" y="76" class="s-mono2" text-anchor="middle">gönderen</text>
<text x="360" y="76" class="s-mono2" text-anchor="middle">alıcı</text>

<line x1="90" y1="104" x2="354" y2="104" stroke="var(--green)" stroke-width="1.7" marker-end="url(#ok16g)"/>
<text x="222" y="96" class="s-mono2" text-anchor="middle">segment 1</text>
<line x1="90" y1="140" x2="230" y2="140" stroke="var(--red)" stroke-width="1.7" marker-end="url(#ok16r)"/>
<text x="222" y="132" class="s-mono2" text-anchor="middle">segment 2 ✕ KAYIP</text>
<line x1="90" y1="176" x2="354" y2="176" stroke="var(--green)" stroke-width="1.7" marker-end="url(#ok16g)"/>
<text x="222" y="168" class="s-mono2" text-anchor="middle">segment 3</text>

<line x1="360" y1="212" x2="96" y2="212" stroke="var(--accent)" stroke-width="1.7" marker-end="url(#ok16a)"/>
<text x="222" y="204" class="s-mono2" text-anchor="middle">ACK: “hâlâ 2'yi bekliyorum”</text>

<line x1="90" y1="256" x2="354" y2="256" stroke="var(--gold)" stroke-width="1.9" marker-end="url(#ok16g)"/>
<text x="222" y="248" class="s-mono2 s-altin" text-anchor="middle">segment 2 — YENİDEN</text>

<line x1="360" y1="292" x2="96" y2="292" stroke="var(--accent)" stroke-width="1.7" marker-end="url(#ok16a)"/>
<text x="222" y="284" class="s-mono2" text-anchor="middle">ACK: “3'e kadar tamam”</text>

<rect x="50" y="320" width="350" height="72" rx="8" fill="var(--green-soft)" stroke="var(--green)"/>
<text x="66" y="346" class="s-metin2">Uygulama veriyi EKSİKSİZ ve SIRALI alır: 1·2·3</text>
<text x="66" y="368" class="s-metin2">Bedeli: 3, kayıp 2 gelene dek bekletildi →</text>
<text x="66" y="386" class="s-metin2">gecikme değişken (jitter), zamanlama garanti değil</text>

<!-- ============== UDP paneli ============== -->
<rect x="440" y="30" width="390" height="380" rx="12" fill="var(--dia-panel)" stroke="var(--line-2)"/>
<text x="635" y="60" class="s-baslik" text-anchor="middle">UDP: kayıp kayıptır</text>

<g stroke="var(--line-2)" stroke-dasharray="3 5">
<line x1="500" y1="80" x2="500" y2="380"/>
<line x1="770" y1="80" x2="770" y2="380"/>
</g>
<text x="500" y="76" class="s-mono2" text-anchor="middle">gönderen</text>
<text x="770" y="76" class="s-mono2" text-anchor="middle">alıcı</text>

<line x1="500" y1="104" x2="764" y2="104" stroke="var(--green)" stroke-width="1.7" marker-end="url(#ok16g)"/>
<text x="632" y="96" class="s-mono2" text-anchor="middle">datagram 1</text>
<line x1="500" y1="140" x2="640" y2="140" stroke="var(--red)" stroke-width="1.7" marker-end="url(#ok16r)"/>
<text x="632" y="132" class="s-mono2" text-anchor="middle">datagram 2 ✕ KAYIP</text>
<line x1="500" y1="176" x2="764" y2="176" stroke="var(--green)" stroke-width="1.7" marker-end="url(#ok16g)"/>
<text x="632" y="168" class="s-mono2" text-anchor="middle">datagram 3</text>

<text x="632" y="224" class="s-metin2" text-anchor="middle">ACK yok. Soru soran yok.</text>
<text x="632" y="244" class="s-metin2" text-anchor="middle">Gönderen 2'nin öldüğünü hiç öğrenmez.</text>

<rect x="460" y="320" width="350" height="72" rx="8" fill="var(--gold-soft)" stroke="var(--gold)"/>
<text x="476" y="346" class="s-metin2">Uygulama 1 ve 3'ü ANINDA alır; 2 yok.</text>
<text x="476" y="368" class="s-metin2">Delikle yaşamak uygulamanın işi (örn. sıra no koy,</text>
<text x="476" y="386" class="s-metin2">eskiyi at). Kazanç: sabit düşük gecikme.</text>
</svg>
