<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-s10">
<title id="t-s10">ARP request'in broadcast olarak tüm ağa yayılması ve yalnızca hedefin unicast ARP reply ile cevap vermesi</title>
<defs>
<marker id="ok10g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--gold)"/>
</marker>
<marker id="ok10a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
</marker>
</defs>

<!-- aktörler -->
<g text-anchor="middle">
<rect x="60" y="40" width="180" height="58" rx="8" fill="var(--dia-blok)" stroke="var(--line-2)"/>
<text x="150" y="63" class="s-metin">PC (soran)</text>
<text x="150" y="84" class="s-mono2">192.168.1.20 · aa:bb:cc:11:22:33</text>

<rect x="400" y="40" width="200" height="58" rx="8" fill="var(--dia-blok)" stroke="var(--accent)"/>
<text x="500" y="63" class="s-metin">FPGA kartı (aranan)</text>
<text x="500" y="84" class="s-mono2">192.168.1.130 · d8:3a:dd:4f:a2:1c</text>

<rect x="680" y="40" width="140" height="58" rx="8" fill="var(--dia-blok)" stroke="var(--line-2)"/>
<text x="750" y="63" class="s-metin">Diğer cihaz</text>
<text x="750" y="84" class="s-mono2">192.168.1.77</text>
</g>

<!-- yaşam çizgileri -->
<g stroke="var(--line-2)" stroke-dasharray="3 5">
<line x1="150" y1="98" x2="150" y2="330"/>
<line x1="500" y1="98" x2="500" y2="330"/>
<line x1="750" y1="98" x2="750" y2="330"/>
</g>

<!-- request: broadcast -->
<line x1="150" y1="150" x2="494" y2="150" stroke="var(--gold)" stroke-width="1.8" marker-end="url(#ok10g)"/>
<line x1="150" y1="150" x2="744" y2="176" stroke="var(--gold)" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#ok10g)"/>
<text x="322" y="136" class="s-metin s-altin" text-anchor="middle">ARP request — BROADCAST (ff:ff:ff:ff:ff:ff)</text>
<text x="322" y="170" class="s-mono2" text-anchor="middle">“Who has 192.168.1.130? Tell 192.168.1.20”</text>

<text x="750" y="216" class="s-metin2" text-anchor="middle">“ben değilim”</text>
<text x="750" y="234" class="s-metin2" text-anchor="middle">→ sessizce yok sayar</text>

<!-- reply: unicast -->
<line x1="500" y1="264" x2="156" y2="264" stroke="var(--accent)" stroke-width="1.8" marker-end="url(#ok10a)"/>
<text x="322" y="250" class="s-metin s-vurgu" text-anchor="middle">ARP reply — UNICAST (yalnız sorana)</text>
<text x="322" y="284" class="s-mono2" text-anchor="middle">“192.168.1.130 is at d8:3a:dd:4f:a2:1c”</text>

<!-- cache -->
<rect x="60" y="344" width="420" height="70" rx="8" fill="var(--green-soft)" stroke="var(--green)"/>
<text x="78" y="370" class="s-metin s-yesil">PC'nin ARP cache'ine yazılır (dakikalarca geçerli):</text>
<text x="78" y="394" class="s-mono2">192.168.1.130 → d8:3a:dd:4f:a2:1c</text>
<text x="560" y="370" class="s-metin2">Sonraki paketler için</text>
<text x="560" y="390" class="s-metin2">soru tekrar sorulmaz.</text>
</svg>
