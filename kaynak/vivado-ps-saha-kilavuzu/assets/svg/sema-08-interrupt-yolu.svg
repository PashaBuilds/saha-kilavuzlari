<svg viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s8-title">
  <title id="s8-title">Interrupt yolculuğu: PL'deki timer IP'sinden concat bloğuna, pl_ps_irq0 girişine, GIC'e ve yazılımdaki interrupt servis rutinine; IRQ ID eşleşmesi</title>
  <defs>
    <marker id="s8-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--mor)"/>
    </marker>
  </defs>

  <!-- duraklar -->
  <rect x="20" y="60" width="140" height="70" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="90" y="86" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700" font-family="Consolas, monospace">axi_timer_0</text>
  <text x="90" y="104" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">interrupt çıkışı</text>
  <text x="90" y="119" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">(1 tel, seviye)</text>

  <rect x="220" y="60" width="130" height="70" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="285" y="86" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700" font-family="Consolas, monospace">irq_concat</text>
  <text x="285" y="104" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">telleri demet yapar</text>
  <text x="285" y="119" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">In0→bit0, In1→bit1…</text>

  <rect x="410" y="60" width="140" height="70" rx="8" fill="var(--vurgu-yumusak)" stroke="var(--vurgu)" stroke-width="1.5"/>
  <text x="480" y="86" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700" font-family="Consolas, monospace">pl_ps_irq0</text>
  <text x="480" y="104" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">PS kapısı (8 bit'e dek)</text>
  <text x="480" y="119" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">bit0 → ID 121</text>

  <rect x="610" y="60" width="90" height="70" rx="8" fill="var(--kart)" stroke="var(--vurgu)" stroke-width="1.5"/>
  <text x="655" y="90" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700">GIC</text>
  <text x="655" y="108" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">önceliklendirir</text>

  <rect x="730" y="45" width="76" height="100" rx="8" fill="var(--yesil-yumusak)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="768" y="75" text-anchor="middle" fill="var(--yesil)" font-size="12" font-weight="700">ISR</text>
  <text x="768" y="93" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">senin</text>
  <text x="768" y="106" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">handler</text>
  <text x="768" y="119" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">kodun</text>

  <!-- yol -->
  <line x1="160" y1="95" x2="216" y2="95" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s8-ok)"/>
  <line x1="350" y1="95" x2="406" y2="95" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s8-ok)"/>
  <line x1="550" y1="95" x2="606" y2="95" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s8-ok)"/>
  <line x1="700" y1="95" x2="726" y2="95" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s8-ok)"/>

  <!-- PL / PS sinir -->
  <line x1="580" y1="34" x2="580" y2="180" stroke="var(--cizgi)" stroke-width="1.2" stroke-dasharray="6 5"/>
  <text x="560" y="26" text-anchor="end" fill="var(--metin-soluk)" font-size="10.5" font-weight="700">PL tarafı</text>
  <text x="600" y="26" fill="var(--metin-soluk)" font-size="10.5" font-weight="700">PS tarafı</text>

  <!-- ID eslesme tablosu -->
  <rect x="130" y="190" width="560" height="118" rx="10" fill="var(--kart)" stroke="var(--altin)" stroke-width="1.5"/>
  <text x="410" y="214" text-anchor="middle" fill="var(--altin)" font-size="11.5" font-weight="700" letter-spacing="0.5">ID EŞLEŞMESİ — zincirin yazılıma değdiği yer</text>
  <g font-family="Consolas, monospace" font-size="11" fill="var(--metin)">
    <text x="160" y="240">concat In0 = timer</text>
    <text x="160" y="262">concat In1 = uartlite</text>
    <text x="160" y="284">concat In2 = gpio</text>
    <text x="400" y="240">→ pl_ps_irq0[0] → IRQ ID 121</text>
    <text x="400" y="262">→ pl_ps_irq0[1] → IRQ ID 122</text>
    <text x="400" y="284">→ pl_ps_irq0[2] → IRQ ID 123</text>
  </g>

  <text x="410" y="330" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">Concat'ın giriş SIRASI yazılımdaki ID'yi belirler. Sırayı yanlış okursan handler yanlış kaynağa bağlanır — sessizce.</text>
</svg>
