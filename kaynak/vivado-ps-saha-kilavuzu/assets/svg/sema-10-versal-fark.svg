<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s10-title">
  <title id="s10-title">Versal ile MPSoC mimari farkı: PS IP'nin yerini CIPS alır, DDR denetleyicisi PS içinden çıkıp NoC arkasına DDRMC olarak taşınır, AI Engine ayrı bir bölge olur</title>
  <defs>
    <marker id="s10-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- MPSoC tarafi -->
  <rect x="16" y="30" width="380" height="330" rx="12" fill="var(--kart)" stroke="var(--cizgi)" stroke-width="1.5"/>
  <text x="206" y="56" text-anchor="middle" fill="var(--metin)" font-size="13" font-weight="700" letter-spacing="1">MPSoC / RFSoC (UltraScale+)</text>

  <rect x="40" y="76" width="200" height="180" rx="10" fill="var(--vurgu-yumusak)" stroke="var(--vurgu)" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" fill="var(--vurgu)" font-size="12" font-weight="700">PS IP (tek kutu)</text>
  <rect x="56" y="114" width="168" height="36" rx="6" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="140" y="137" text-anchor="middle" fill="var(--metin)" font-size="10.5">APU + RPU + çevre birimleri</text>
  <rect x="56" y="158" width="168" height="36" rx="6" fill="var(--kart)" stroke="var(--altin)" stroke-width="1.5"/>
  <text x="140" y="181" text-anchor="middle" fill="var(--metin)" font-size="10.5" font-weight="700">DDR denetleyici İÇERİDE</text>
  <rect x="56" y="202" width="168" height="36" rx="6" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="140" y="225" text-anchor="middle" fill="var(--metin)" font-size="10.5">MIO/EMIO · PS-PL AXI</text>

  <rect x="270" y="76" width="106" height="180" rx="10" fill="var(--kart-2)" stroke="var(--cizgi)" stroke-dasharray="6 4"/>
  <text x="323" y="100" text-anchor="middle" fill="var(--metin-soluk)" font-size="11" font-weight="700">PL</text>
  <text x="323" y="120" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">AXI IP'ler</text>
  <line x1="240" y1="150" x2="266" y2="150" stroke="var(--vurgu)" stroke-width="2" marker-end="url(#s10-ok)"/>

  <rect x="40" y="280" width="336" height="56" rx="8" fill="var(--altin-yumusak)" stroke="var(--altin)"/>
  <text x="208" y="302" text-anchor="middle" fill="var(--metin)" font-size="10.5">DDR ayarı → PS IP re-customize ekranının İÇİNDE</text>
  <text x="208" y="320" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">"DDR nerede?" sorusunun cevabı hep aynı kutu</text>

  <!-- Versal tarafi -->
  <rect x="424" y="30" width="380" height="330" rx="12" fill="var(--kart)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="614" y="56" text-anchor="middle" fill="var(--yesil)" font-size="13" font-weight="700" letter-spacing="1">VERSAL</text>

  <rect x="444" y="76" width="150" height="110" rx="10" fill="var(--vurgu-yumusak)" stroke="var(--vurgu)" stroke-width="1.5"/>
  <text x="519" y="98" text-anchor="middle" fill="var(--vurgu)" font-size="11.5" font-weight="700">CIPS</text>
  <text x="519" y="116" text-anchor="middle" fill="var(--metin-soluk)" font-size="9">Control, Interfaces &amp;</text>
  <text x="519" y="129" text-anchor="middle" fill="var(--metin-soluk)" font-size="9">Processing System</text>
  <text x="519" y="150" text-anchor="middle" fill="var(--metin)" font-size="9.5">APU+RPU+PMC</text>
  <text x="519" y="166" text-anchor="middle" fill="var(--metin)" font-size="9.5">çevre birimleri</text>

  <!-- NoC seridi -->
  <rect x="444" y="210" width="340" height="44" rx="8" fill="var(--mor-yumusak)" stroke="var(--mor)" stroke-width="2"/>
  <text x="614" y="230" text-anchor="middle" fill="var(--mor)" font-size="12" font-weight="700" letter-spacing="1">NoC — çip içi omurga ağı</text>
  <text x="614" y="246" text-anchor="middle" fill="var(--metin-soluk)" font-size="9">tüm yüksek bant trafiği buradan geçer</text>

  <rect x="444" y="284" width="150" height="52" rx="8" fill="var(--kart)" stroke="var(--altin)" stroke-width="2"/>
  <text x="519" y="305" text-anchor="middle" fill="var(--metin)" font-size="11" font-weight="700">DDRMC</text>
  <text x="519" y="323" text-anchor="middle" fill="var(--altin)" font-size="9.5" font-weight="700">DDR artık BURADA</text>

  <rect x="634" y="76" width="150" height="110" rx="10" fill="var(--kart-2)" stroke="var(--cizgi)" stroke-dasharray="6 4"/>
  <text x="709" y="100" text-anchor="middle" fill="var(--metin-soluk)" font-size="11" font-weight="700">PL + AI Engine</text>
  <text x="709" y="120" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">AXI IP'ler · (AIE: ayrı dünya,</text>
  <text x="709" y="134" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">bu kılavuzda sadece pencere)</text>

  <rect x="634" y="284" width="150" height="52" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="709" y="305" text-anchor="middle" fill="var(--metin)" font-size="10.5">PL IP'ler NoC'tan da</text>
  <text x="709" y="322" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">beslenebilir (NSU kapısı)</text>

  <!-- baglantilar -->
  <line x1="519" y1="186" x2="519" y2="206" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s10-ok)"/>
  <line x1="519" y1="254" x2="519" y2="280" stroke="var(--mor)" stroke-width="2.5" marker-end="url(#s10-ok)"/>
  <line x1="709" y1="186" x2="709" y2="206" stroke="var(--mor)" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#s10-ok)"/>
  <line x1="709" y1="254" x2="709" y2="280" stroke="var(--mor)" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#s10-ok)"/>
  <line x1="594" y1="131" x2="630" y2="131" stroke="var(--vurgu)" stroke-width="1.6" marker-end="url(#s10-ok)"/>
  <text x="612" y="122" text-anchor="middle" fill="var(--metin-soluk)" font-size="8.5">M_AXI_FPD</text>

  <text x="410" y="392" text-anchor="middle" fill="var(--kirmizi)" font-size="11" font-weight="600">Refleks düzeltmesi: Versal blok dizaynında DDR'ı CIPS'in içinde ARAMA — NoC'a çift tıkla, DDRMC oradadır.</text>
  <text x="410" y="410" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">Bitstream'in adı da değişir: Versal'de PL yapılandırması PDI (Programmable Device Image) içinde taşınır.</text>
</svg>
