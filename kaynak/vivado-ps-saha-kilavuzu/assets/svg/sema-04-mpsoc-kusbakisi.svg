<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s4-title">
  <title id="s4-title">Zynq UltraScale+ MPSoC PS kuşbakışı: APU ve RPU çekirdekleri, sabit çevre birimleri, MIO ve EMIO çıkış kapıları, DDR denetleyicisi ve PS-PL AXI kapıları</title>
  <defs>
    <marker id="s4-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- PS govdesi -->
  <rect x="20" y="20" width="540" height="400" rx="14" fill="var(--vurgu-yumusak)" stroke="var(--vurgu)" stroke-width="2"/>
  <text x="40" y="48" fill="var(--vurgu)" font-size="14" font-weight="700" letter-spacing="1">PS — PROCESSING SYSTEM (sabit silikon)</text>

  <!-- APU -->
  <rect x="40" y="66" width="240" height="88" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="160" y="90" text-anchor="middle" fill="var(--metin)" font-size="13" font-weight="700">APU</text>
  <text x="160" y="108" text-anchor="middle" fill="var(--metin-soluk)" font-size="11">4× Cortex-A53</text>
  <text x="160" y="124" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">Linux / baremetal uygulaman</text>
  <text x="160" y="142" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">GIC: interrupt'lar buraya düşer</text>

  <!-- RPU -->
  <rect x="300" y="66" width="240" height="88" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="420" y="90" text-anchor="middle" fill="var(--metin)" font-size="13" font-weight="700">RPU</text>
  <text x="420" y="108" text-anchor="middle" fill="var(--metin-soluk)" font-size="11">2× Cortex-R5F</text>
  <text x="420" y="124" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">gerçek-zaman görevleri,</text>
  <text x="420" y="142" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">güvenlik-kritik döngüler</text>

  <!-- sabit cevre birimleri -->
  <rect x="40" y="172" width="330" height="120" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
  <text x="205" y="194" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700">SABİT ÇEVRE BİRİMLERİ</text>
  <text x="205" y="211" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">hepsi silikonda hazır; sen sadece AÇIK/KAPALI ve pin seçersin</text>
  <g font-family="Consolas, monospace" font-size="10.5" fill="var(--metin)">
    <text x="58" y="234">UART0/1</text><text x="128" y="234">I2C0/1</text><text x="192" y="234">SPI0/1</text><text x="252" y="234">CAN0/1</text><text x="312" y="234">GPIO</text>
    <text x="58" y="256">SD0/1</text><text x="128" y="256">QSPI</text><text x="192" y="256">NAND</text><text x="252" y="256">USB0/1</text><text x="312" y="256">GEM0-3</text>
    <text x="58" y="278">TTC0-3</text><text x="128" y="278">SWDT</text><text x="192" y="278">DP</text><text x="252" y="278">SATA</text><text x="312" y="278">PCIe</text>
  </g>

  <!-- DDR controller -->
  <rect x="390" y="172" width="150" height="120" rx="8" fill="var(--kart)" stroke="var(--altin)" stroke-width="1.5"/>
  <text x="465" y="196" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700">DDR</text>
  <text x="465" y="212" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700">Denetleyici</text>
  <text x="465" y="234" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">kodunun, heap'inin,</text>
  <text x="465" y="248" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">Linux'un fiziksel evi</text>
  <text x="465" y="270" text-anchor="middle" fill="var(--altin)" font-size="10" font-family="Consolas, monospace">DDR4 @ PS</text>

  <!-- MIO / EMIO kapilari -->
  <rect x="40" y="316" width="240" height="84" rx="8" fill="var(--altin-yumusak)" stroke="var(--altin)" stroke-width="1.5"/>
  <text x="160" y="340" text-anchor="middle" fill="var(--altin)" font-size="12.5" font-weight="700">MIO KAPISI</text>
  <text x="160" y="358" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">78 adanmış PS pini</text>
  <text x="160" y="374" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">çevre birimi → doğrudan dünya</text>
  <text x="160" y="390" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">PL'e hiç uğramaz</text>

  <rect x="300" y="316" width="240" height="84" rx="8" fill="var(--yesil-yumusak)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="420" y="340" text-anchor="middle" fill="var(--yesil)" font-size="12.5" font-weight="700">EMIO KAPISI</text>
  <text x="420" y="358" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">aynı çevre birimi, PL üzerinden</text>
  <text x="420" y="374" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">istediğin PL pinine/bloğuna çıkar</text>
  <text x="420" y="390" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">(Bölüm 5'te ayrıntı)</text>

  <!-- PL tarafi -->
  <rect x="600" y="20" width="200" height="400" rx="14" fill="var(--kart)" stroke="var(--cizgi)" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="700" y="48" text-anchor="middle" fill="var(--metin-soluk)" font-size="14" font-weight="700" letter-spacing="1">PL — FPGA</text>
  <text x="700" y="66" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">donanımcının IP'leri</text>

  <!-- PS-PL AXI kapilari -->
  <g>
    <rect x="620" y="96" width="160" height="52" rx="8" fill="var(--kart-2)" stroke="var(--vurgu)" stroke-width="1.5"/>
    <text x="700" y="118" text-anchor="middle" fill="var(--metin)" font-size="11" font-weight="700" font-family="Consolas, monospace">M_AXI_HPM0/1</text>
    <text x="700" y="136" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">PS master → PL slave</text>
    <line x1="560" y1="122" x2="616" y2="122" stroke="var(--vurgu)" stroke-width="2.5" marker-end="url(#s4-ok)"/>

    <rect x="620" y="168" width="160" height="52" rx="8" fill="var(--kart-2)" stroke="var(--yesil)" stroke-width="1.5"/>
    <text x="700" y="190" text-anchor="middle" fill="var(--metin)" font-size="11" font-weight="700" font-family="Consolas, monospace">S_AXI_HP0-3</text>
    <text x="700" y="208" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">PL master → DDR'a DMA</text>
    <line x1="616" y1="194" x2="560" y2="194" stroke="var(--yesil)" stroke-width="2.5" marker-end="url(#s4-ok)"/>

    <rect x="620" y="240" width="160" height="52" rx="8" fill="var(--kart-2)" stroke="var(--mor)" stroke-width="1.5"/>
    <text x="700" y="262" text-anchor="middle" fill="var(--metin)" font-size="11" font-weight="700" font-family="Consolas, monospace">pl_ps_irq0/1</text>
    <text x="700" y="280" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">PL interrupt → GIC</text>
    <line x1="616" y1="266" x2="560" y2="266" stroke="var(--mor)" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#s4-ok)"/>

    <rect x="620" y="312" width="160" height="52" rx="8" fill="var(--kart-2)" stroke="var(--altin)" stroke-width="1.5"/>
    <text x="700" y="334" text-anchor="middle" fill="var(--metin)" font-size="11" font-weight="700" font-family="Consolas, monospace">pl_clk0-3</text>
    <text x="700" y="352" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">PS'ten PL'e fabric clock</text>
    <line x1="560" y1="338" x2="616" y2="338" stroke="var(--altin)" stroke-width="2" marker-end="url(#s4-ok)"/>
  </g>

  <text x="410" y="432" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">Bu şemadaki her kapının ayarı, PS IP re-customize ekranındaki bir sekmeye karşılık gelir (Bölüm 5-6).</text>
</svg>
