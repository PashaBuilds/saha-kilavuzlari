<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s6-title">
  <title id="s6-title">Basitleştirilmiş PS clock ağacı: referans kristal, PLL'ler, çevre birimi referans saatleri ve PL'e giden fabric clocklar</title>
  <defs>
    <marker id="s6-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- kaynak -->
  <rect x="20" y="160" width="130" height="70" rx="8" fill="var(--kart)" stroke="var(--altin)" stroke-width="2"/>
  <text x="85" y="186" text-anchor="middle" fill="var(--metin)" font-size="12.5" font-weight="700">PSS_REF_CLK</text>
  <text x="85" y="204" text-anchor="middle" fill="var(--altin)" font-size="11.5" font-family="Consolas, monospace">33.330 MHz</text>
  <text x="85" y="220" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">karttaki kristal</text>

  <!-- PLL'ler -->
  <g>
    <rect x="220" y="40" width="110" height="46" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
    <text x="275" y="60" text-anchor="middle" fill="var(--metin)" font-size="11.5" font-weight="700">APLL</text>
    <text x="275" y="76" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">APU tarafı</text>

    <rect x="220" y="106" width="110" height="46" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
    <text x="275" y="126" text-anchor="middle" fill="var(--metin)" font-size="11.5" font-weight="700">DPLL</text>
    <text x="275" y="142" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">DDR tarafı</text>

    <rect x="220" y="172" width="110" height="46" rx="8" fill="var(--kart)" stroke="var(--cizgi)"/>
    <text x="275" y="192" text-anchor="middle" fill="var(--metin)" font-size="11.5" font-weight="700">VPLL</text>
    <text x="275" y="208" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">video</text>

    <rect x="220" y="238" width="110" height="46" rx="8" fill="var(--kart)" stroke="var(--vurgu)" stroke-width="1.5"/>
    <text x="275" y="258" text-anchor="middle" fill="var(--metin)" font-size="11.5" font-weight="700">IOPLL</text>
    <text x="275" y="274" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">çevre birimleri</text>

    <rect x="220" y="304" width="110" height="46" rx="8" fill="var(--kart)" stroke="var(--vurgu)" stroke-width="1.5"/>
    <text x="275" y="324" text-anchor="middle" fill="var(--metin)" font-size="11.5" font-weight="700">RPLL</text>
    <text x="275" y="340" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">yedek/paylaşım</text>
  </g>

  <line x1="150" y1="195" x2="216" y2="63"  stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="150" y1="195" x2="216" y2="129" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="150" y1="195" x2="216" y2="195" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="150" y1="195" x2="216" y2="261" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="150" y1="195" x2="216" y2="327" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>

  <!-- bolucu + tuketiciler -->
  <g>
    <rect x="420" y="40" width="170" height="46" rx="8" fill="var(--kart-2)" stroke="var(--cizgi)"/>
    <text x="505" y="60" text-anchor="middle" fill="var(--metin)" font-size="11" font-family="Consolas, monospace">APU @ 1200 MHz</text>
    <text x="505" y="76" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">işlemci çekirdekleri</text>

    <rect x="420" y="106" width="170" height="46" rx="8" fill="var(--kart-2)" stroke="var(--cizgi)"/>
    <text x="505" y="126" text-anchor="middle" fill="var(--metin)" font-size="11" font-family="Consolas, monospace">DDR @ 1067 MHz</text>
    <text x="505" y="142" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">bellek arabirimi</text>

    <rect x="420" y="196" width="170" height="52" rx="8" fill="var(--yesil-yumusak)" stroke="var(--yesil)" stroke-width="1.5"/>
    <text x="505" y="216" text-anchor="middle" fill="var(--metin)" font-size="11" font-family="Consolas, monospace">UART0_REF ≈ 100 MHz</text>
    <text x="505" y="234" text-anchor="middle" fill="var(--yesil)" font-size="9.5" font-weight="700">baud bölücüsünün girişi = BU değer</text>

    <rect x="420" y="268" width="170" height="46" rx="8" fill="var(--kart-2)" stroke="var(--cizgi)"/>
    <text x="505" y="288" text-anchor="middle" fill="var(--metin)" font-size="11" font-family="Consolas, monospace">SD/QSPI/GEM ref</text>
    <text x="505" y="304" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">diğer çevre birimi saatleri</text>

    <rect x="420" y="334" width="170" height="52" rx="8" fill="var(--altin-yumusak)" stroke="var(--altin)" stroke-width="1.5"/>
    <text x="505" y="354" text-anchor="middle" fill="var(--metin)" font-size="11" font-family="Consolas, monospace">pl_clk0 @ 100 MHz</text>
    <text x="505" y="372" text-anchor="middle" fill="var(--altin)" font-size="9.5" font-weight="700">PL'deki AXI IP'lerin kalbi</text>
  </g>

  <line x1="330" y1="63"  x2="416" y2="63"  stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="330" y1="129" x2="416" y2="129" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <line x1="330" y1="261" x2="416" y2="222" stroke="var(--yesil)" stroke-width="1.6" marker-end="url(#s6-ok)"/>
  <line x1="330" y1="261" x2="416" y2="291" stroke="var(--cizgi)" stroke-width="1.3" marker-end="url(#s6-ok)"/>
  <!-- pl_clk0 kaynagi IOPLL'dir (demo projede PL0 = IOPLL; bkz. Ekran 13) -->
  <line x1="330" y1="272" x2="416" y2="372" stroke="var(--altin)" stroke-width="1.6" marker-end="url(#s6-ok)"/>

  <!-- PL tuketicileri -->
  <rect x="650" y="322" width="150" height="76" rx="10" fill="var(--kart)" stroke="var(--cizgi)" stroke-dasharray="6 4"/>
  <text x="725" y="344" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5" font-weight="700">PL</text>
  <text x="725" y="362" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5" font-family="Consolas, monospace">axi_gpio, axi_timer,</text>
  <text x="725" y="376" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5" font-family="Consolas, monospace">axi_uartlite, smc...</text>
  <line x1="590" y1="360" x2="646" y2="360" stroke="var(--altin)" stroke-width="1.6" marker-end="url(#s6-ok)"/>

  <!-- not -->
  <text x="640" y="80" fill="var(--metin-soluk)" font-size="10.5">Her satırın "istenen" ve "gerçek"</text>
  <text x="640" y="96" fill="var(--metin-soluk)" font-size="10.5">(actual) değeri vardır; yazılım</text>
  <text x="640" y="112" fill="var(--metin-soluk)" font-size="10.5">hesapları GERÇEK değeri kullanır.</text>
  <text x="640" y="128" fill="var(--metin-soluk)" font-size="10.5">Örn. 99.990 MHz ≠ 100 MHz.</text>
</svg>
