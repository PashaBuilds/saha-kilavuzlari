<svg viewBox="0 0 820 474" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s15-title">
  <title id="s15-title">MMI ve updatemem akışı: ELF dosyası, MMI haritası ve bitstream birleşerek BRAM'i yazılımla doldurulmuş yeni bitstream üretir; sentez tekrarı gerekmez</title>
  <defs>
    <marker id="s15-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- girisler -->
  <rect x="30" y="40" width="220" height="74" rx="10" fill="var(--yesil-yumusak)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="140" y="66" text-anchor="middle" fill="var(--yesil)" font-size="12" font-weight="700" font-family="Consolas, monospace">app.elf</text>
  <text x="140" y="86" text-anchor="middle" fill="var(--metin)" font-size="10">senin derlenmiş yazılımın</text>
  <text x="140" y="102" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">(Vitis'ten; hedef: LMB BRAM)</text>

  <rect x="30" y="140" width="220" height="90" rx="10" fill="var(--altin-yumusak)" stroke="var(--altin)" stroke-width="2"/>
  <text x="140" y="164" text-anchor="middle" fill="var(--altin)" font-size="12" font-weight="700" font-family="Consolas, monospace">sistem.mmi</text>
  <text x="140" y="184" text-anchor="middle" fill="var(--metin)" font-size="10">Memory Map Info — hangi adres</text>
  <text x="140" y="200" text-anchor="middle" fill="var(--metin)" font-size="10">aralığı HANGİ fiziksel BRAM'de?</text>
  <text x="140" y="218" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">(write_mem_info; impl sonrası üretilir)</text>

  <rect x="30" y="256" width="220" height="74" rx="10" fill="var(--kart)" stroke="var(--cizgi)" stroke-width="1.5"/>
  <text x="140" y="282" text-anchor="middle" fill="var(--metin)" font-size="12" font-weight="700" font-family="Consolas, monospace">sistem_wrapper.bit</text>
  <text x="140" y="302" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">donanımcının bitstream'i</text>
  <text x="140" y="318" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">(BRAM içeriği henüz boş/eski)</text>

  <!-- updatemem -->
  <rect x="350" y="140" width="180" height="96" rx="12" fill="var(--vurgu-yumusak)" stroke="var(--vurgu)" stroke-width="2"/>
  <text x="440" y="172" text-anchor="middle" fill="var(--vurgu)" font-size="14" font-weight="700" font-family="Consolas, monospace">updatemem</text>
  <text x="440" y="192" text-anchor="middle" fill="var(--metin)" font-size="10">ELF'i MMI haritasına göre</text>
  <text x="440" y="208" text-anchor="middle" fill="var(--metin)" font-size="10">bitstream'in BRAM init</text>
  <text x="440" y="224" text-anchor="middle" fill="var(--metin)" font-size="10">bitlerine işler</text>

  <line x1="250" y1="77"  x2="346" y2="160" stroke="var(--yesil)" stroke-width="2" marker-end="url(#s15-ok)"/>
  <line x1="250" y1="185" x2="346" y2="185" stroke="var(--altin)" stroke-width="2.5" marker-end="url(#s15-ok)"/>
  <line x1="250" y1="293" x2="346" y2="212" stroke="var(--cizgi)" stroke-width="2" marker-end="url(#s15-ok)"/>

  <!-- cikti -->
  <rect x="600" y="146" width="190" height="84" rx="10" fill="var(--kart)" stroke="var(--yesil)" stroke-width="2"/>
  <text x="695" y="172" text-anchor="middle" fill="var(--yesil)" font-size="12" font-weight="700" font-family="Consolas, monospace">download.bit</text>
  <text x="695" y="192" text-anchor="middle" fill="var(--metin)" font-size="10">yazılım GÖMÜLÜ bitstream</text>
  <text x="695" y="210" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">karta bunu yüklersin;</text>
  <text x="695" y="224" text-anchor="middle" fill="var(--metin-soluk)" font-size="9.5">MB reset'ten kodunla çıkar</text>
  <line x1="530" y1="188" x2="596" y2="188" stroke="var(--yesil)" stroke-width="2.5" marker-end="url(#s15-ok)"/>

  <!-- vurgu notlari (kutularin ALTINDA — bindirme yok) -->
  <text x="410" y="360" text-anchor="middle" fill="var(--kirmizi)" font-size="11" font-weight="600">Can alıcı nokta: bu akışta SENTEZ ve IMPLEMENTASYON YOK — yazılım değişikliği saniyeler içinde yeni bitstream'e döner.</text>
  <text x="410" y="380" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">MMI olmadan updatemem çalışamaz: hangi ELF baytının hangi BRAM hücresine gideceğini yalnız MMI bilir.</text>
  <text x="410" y="398" text-anchor="middle" fill="var(--metin-soluk)" font-size="10">-proc argümanındaki hiyerarşik ad (sistem_i/microblaze_0) MMI içindeki işlemci etiketiyle birebir aynı olmalıdır.</text>

  <!-- komut kutusu -->
  <rect x="30" y="410" width="760" height="34" rx="8" fill="var(--kod-zemin)" stroke="var(--cizgi)"/>
  <text x="46" y="432" fill="var(--metin)" font-size="10.5" font-family="Consolas, monospace">updatemem -meminfo sistem.mmi -data app.elf -bit sistem_wrapper.bit -proc sistem_i/microblaze_0 -out download.bit</text>

  <text x="410" y="464" text-anchor="middle" fill="var(--metin-soluk)" font-size="10.5">Alternatif akış: Vitis "Program FPGA" da aynı işi perde arkasında updatemem ile yapar — .xsa içindeki MMI'yi kullanır.</text>
</svg>
