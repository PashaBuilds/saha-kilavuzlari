<svg viewBox="0 0 848 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-labelledby="s9-title">
  <title id="s9-title">Adres çözümleme zinciri: Address Editor satırından .xsa dosyasına, xparameters.h tanımına ve koddaki base pointer kullanımına</title>
  <defs>
    <marker id="s9-ok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--metin-soluk)"/>
    </marker>
  </defs>

  <!-- 1: Address Editor -->
  <rect x="30" y="24" width="760" height="76" rx="10" fill="var(--kart)" stroke="var(--vurgu)" stroke-width="1.5"/>
  <text x="48" y="48" fill="var(--vurgu)" font-size="11" font-weight="700">1 · ADDRESS EDITOR SATIRI (Vivado)</text>
  <g font-family="Consolas, monospace" font-size="11.5">
    <text x="48" y="74" fill="var(--metin-soluk)">/ps_ultra/Data</text>
    <text x="220" y="74" fill="var(--metin)">axi_timer_0 · SEG..._Reg</text>
    <text x="460" y="74" fill="var(--altin)" font-weight="700">0xA001_0000</text>
    <text x="600" y="74" fill="var(--metin-soluk)">64K → 0xA001_FFFF</text>
  </g>

  <line x1="410" y1="100" x2="410" y2="124" stroke="var(--metin-soluk)" stroke-width="1.5" marker-end="url(#s9-ok)"/>
  <text x="426" y="118" fill="var(--metin-soluk)" font-size="10">File → Export → Export Hardware</text>

  <!-- 2: xsa -->
  <rect x="30" y="128" width="760" height="66" rx="10" fill="var(--kart)" stroke="var(--altin)" stroke-width="1.5"/>
  <text x="48" y="152" fill="var(--altin)" font-size="11" font-weight="700">2 · .XSA İÇİNDE (sistem.hwh — donanım tarif dosyası)</text>
  <text x="48" y="176" fill="var(--metin-soluk)" font-size="11" font-family="Consolas, monospace">&lt;MEMRANGE BASEVALUE="0xA0010000" HIGHVALUE="0xA001FFFF" INSTANCE="axi_timer_0" ...&gt;</text>

  <line x1="410" y1="194" x2="410" y2="218" stroke="var(--metin-soluk)" stroke-width="1.5" marker-end="url(#s9-ok)"/>
  <text x="426" y="212" fill="var(--metin-soluk)" font-size="10">Vitis: platform oluşturma (BSP üretimi)</text>

  <!-- 3: xparameters -->
  <rect x="30" y="222" width="760" height="88" rx="10" fill="var(--kart)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="48" y="246" fill="var(--yesil)" font-size="11" font-weight="700">3 · XPARAMETERS.H (BSP — yazılımın gördüğü hâli)</text>
  <g font-family="Consolas, monospace" font-size="11.5" fill="var(--metin)">
    <text x="48" y="270">#define XPAR_AXI_TIMER_0_BASEADDR <tspan fill="var(--altin)" font-weight="700">0xA0010000</tspan></text>
    <text x="48" y="292">#define XPAR_AXI_TIMER_0_HIGHADDR 0xA001FFFF</text>
  </g>

  <line x1="410" y1="310" x2="410" y2="334" stroke="var(--metin-soluk)" stroke-width="1.5" marker-end="url(#s9-ok)"/>
  <text x="426" y="328" fill="var(--metin-soluk)" font-size="10">#include ve kullan</text>

  <!-- 4: kod -->
  <rect x="30" y="338" width="760" height="60" rx="10" fill="var(--yesil-yumusak)" stroke="var(--yesil)" stroke-width="1.5"/>
  <text x="48" y="360" fill="var(--yesil)" font-size="11" font-weight="700">4 · SENİN KODUN</text>
  <text x="48" y="384" fill="var(--metin)" font-size="11.5" font-family="Consolas, monospace">XTmrCtr_Initialize(&amp;Timer, XPAR_AXI_TIMER_0_DEVICE_ID);  // taban adres = <tspan fill="var(--altin)" font-weight="700">0xA0010000</tspan></text>

  <!-- sag kenar: ayni sayi vurgusu -->
  <path d="M 798 62 C 820 62, 820 372, 798 372" fill="none" stroke="var(--altin)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="836" y="220" fill="var(--altin)" font-size="10" font-weight="700" transform="rotate(90 836 220)" text-anchor="middle">AYNI SAYI — kaynak: Address Editor</text>
</svg>
