<svg viewBox="0 0 960 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Antenden bit'e: sistem genel blok şeması">
  <!-- 12 sütun grid, sütun = 80px -->

  <!-- ===================== ANTEN ===================== -->
  <g>
    <line class="w-ince" x1="48" y1="88" x2="48" y2="150"/>
    <path class="w-ince" d="M28 68 L68 68 L48 98 Z"/>
    <text class="lbl-s" x="48" y="170" text-anchor="middle">anten</text>
  </g>

  <!-- ===================== RF ÖN UÇ ===================== -->
  <rect class="blk" x="86" y="60" width="128" height="120" rx="8"/>
  <text class="lbl" x="150" y="84" text-anchor="middle">RF ön uç</text>
  <text class="lbl-s" x="150" y="106" text-anchor="middle">LNA · filtre</text>
  <text class="lbl-s" x="150" y="124" text-anchor="middle">DSA · balun</text>
  <text class="lbl-s" x="150" y="152" text-anchor="middle">(analog, §1)</text>
  <path class="w-ince" d="M48 120 L86 120" marker-end="url(#arw-ince)"/>

  <!-- ===================== AFE ===================== -->
  <rect class="blk" x="252" y="40" width="216" height="180" rx="10"/>
  <text class="lbl" x="360" y="66" text-anchor="middle">RF-sampling AFE</text>
  <rect class="blk" x="268" y="80" width="184" height="34" rx="6"/>
  <text class="lbl-s" x="360" y="102" text-anchor="middle">ADC → DDC/NCO (§2–3)</text>
  <rect class="blk" x="268" y="122" width="184" height="34" rx="6"/>
  <text class="lbl-s" x="360" y="144" text-anchor="middle">DAC ← DUC/NCO (§2–3)</text>
  <rect class="blk" x="268" y="164" width="184" height="34" rx="6"/>
  <text class="lbl-s" x="360" y="186" text-anchor="middle">JESD204 + SerDes (§4–7)</text>
  <path class="w-ince" d="M214 100 L268 100" marker-end="url(#arw-ince)"/>
  <path class="w-ince" d="M268 140 L214 140" marker-end="url(#arw-ince)"/>

  <!-- ===================== SERI LANE'LER ===================== -->
  <path class="w-data" d="M468 110 L560 110" marker-end="url(#arw-data)"/>
  <path class="w-data" d="M560 150 L468 150" marker-end="url(#arw-data)"/>
  <text class="pin" x="514" y="98" text-anchor="middle">L × lane</text>
  <text class="pin" x="514" y="172" text-anchor="middle">çok Gb/s seri</text>

  <!-- ===================== VERSAL ===================== -->
  <rect class="blk" x="560" y="40" width="230" height="180" rx="10"/>
  <text class="lbl" x="675" y="66" text-anchor="middle">Versal FPGA</text>
  <rect class="blk" x="576" y="80" width="94" height="52" rx="6"/>
  <text class="lbl-s" x="623" y="102" text-anchor="middle">GT quad</text>
  <text class="lbl-s" x="623" y="120" text-anchor="middle">(§14)</text>
  <rect class="blk" x="680" y="80" width="94" height="52" rx="6"/>
  <text class="lbl-s" x="727" y="102" text-anchor="middle">JESD204C</text>
  <text class="lbl-s" x="727" y="120" text-anchor="middle">IP (§14)</text>
  <rect class="blk" x="576" y="146" width="198" height="30" rx="6"/>
  <text class="lbl-s" x="675" y="166" text-anchor="middle">kullanıcı lojiği / DMA</text>
  <rect class="blk blk-dis" x="576" y="184" width="198" height="28" rx="6"/>
  <text class="lbl-s" x="675" y="203" text-anchor="middle">PS / CPU — senin kodun (§15)</text>

  <!-- ===================== YAZILIM ===================== -->
  <rect class="blk" x="830" y="84" width="100" height="72" rx="8"/>
  <text class="lbl" x="880" y="112" text-anchor="middle">bit'ler</text>
  <text class="lbl-s" x="880" y="134" text-anchor="middle">örnek akışı,</text>
  <text class="lbl-s" x="880" y="148" text-anchor="middle">DSP, kayıt</text>
  <path class="w-ince" d="M790 120 L830 120" marker-end="url(#arw-ince)"/>

  <!-- ===================== CLOCK CHIP ===================== -->
  <rect class="blk blk-clk" x="252" y="300" width="216" height="88" rx="10"/>
  <text class="lbl" x="360" y="330" text-anchor="middle">clock chip</text>
  <text class="lbl-s" x="360" y="352" text-anchor="middle">PLL + dağıtım (§8)</text>
  <text class="lbl-s" x="360" y="372" text-anchor="middle">DCLK / SYSREF çiftleri (§9)</text>

  <!-- referans girişi -->
  <path class="w-ince" d="M180 344 L252 344" marker-end="url(#arw-ince)"/>
  <text class="lbl-s" x="172" y="348" text-anchor="end">referans (ör. 10 MHz)</text>

  <!-- device clock: AFE'ye -->
  <path class="w-clk" d="M320 300 L320 260 L340 260 L340 220" marker-end="url(#arw-clk)"/>
  <text class="pin pin-clk" x="312" y="252" text-anchor="end">device clock</text>

  <!-- device clock: FPGA GT refclk'e -->
  <path class="w-clk" d="M468 330 L620 330 L620 220" marker-end="url(#arw-clk)"/>
  <text class="pin pin-clk" x="630" y="266" text-anchor="start">GT refclk</text>

  <!-- SYSREF: AFE'ye -->
  <path class="w-sysref" d="M400 300 L400 260 L380 260 L380 220" marker-end="url(#arw-sysref)"/>
  <text class="pin pin-sysref" x="408" y="252" text-anchor="start">SYSREF</text>

  <!-- SYSREF: FPGA'ya -->
  <path class="w-sysref" d="M468 366 L700 366 L700 220" marker-end="url(#arw-sysref)"/>
  <text class="pin pin-sysref" x="710" y="266" text-anchor="start">SYSREF</text>

  <!-- SPI kontrol -->
  <path class="w-ctrl" d="M790 198 L900 198 L900 430 L200 430 L200 120 L214 120"/>
  <path class="w-ctrl" d="M360 430 L360 388" marker-end="url(#arw-ctrl)"/>
  <path class="w-ctrl" d="M200 120 L214 120" marker-end="url(#arw-ctrl)"/>
  <text class="pin" x="550" y="422" text-anchor="middle">SPI / register erişimi (§15)</text>

  <!-- lejant -->
  <g>
    <line class="w-clk" x1="30" y1="250" x2="62" y2="250"/>
    <text class="lbl-s" x="68" y="254">device clock</text>
    <line class="w-sysref" x1="30" y1="272" x2="62" y2="272"/>
    <text class="lbl-s" x="68" y="276">SYSREF</text>
    <line class="w-data" x1="30" y1="294" x2="62" y2="294"/>
    <text class="lbl-s" x="68" y="298">veri (SerDes)</text>
    <line class="w-ctrl" x1="30" y1="316" x2="62" y2="316"/>
    <text class="lbl-s" x="68" y="320">kontrol (SPI)</text>
  </g>
</svg>
